<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News | Post-ChatGPT Era: Agentic AI in Industry 5.0</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    .content-area p {
      margin-bottom: 1.5rem;
      line-height: 1.8;
      color: #475569;
    }
  </style>
</head>

<body class="bg-white">

  <!-- Navigation (Matching Index) -->
  <nav class="bg-white/70 backdrop-blur-md border-b sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 h-20 flex items-center justify-between">
      <a href="../index.html#news" class="group flex items-center gap-3">
        <div
          class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-600 group-hover:bg-blue-700 group-hover:text-white transition-all">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
          </svg>
        </div>
        <span
          class="font-bold text-sm uppercase tracking-widest text-slate-400 group-hover:text-slate-900 transition-colors">Back
          to News</span>
      </a>
      <div class="text-right">
        <p id="nav-info" class="text-[10px] text-slate-400 font-bold uppercase tracking-tighter"></p>
      </div>
    </div>
  </nav>
  <main class="max-w-4xl mx-auto px-6 py-20" id="article-content">
    <div class="flex justify-center py-20">
      <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-700"></div>
    </div>
  </main>

  <script>
    async function loadArticle() {
        const container = document.getElementById('article-content');

        try {
            // 1. Fetch the specific JSON file in the same folder
            // Make sure this filename is EXACTLY what is on your disk
            const response = await fetch('award-aist-ith-best-paper-feb-29-2024.json');
            
            if (!response.ok) throw new Error("Could not find the JSON file");
            
            const article = await response.json();

            // 2. Inject the Template
            container.innerHTML = `
                <header class="mb-12">
                    <div class="flex items-center gap-4 mb-6">
                        <span class="px-4 py-1.5 bg-blue-50 text-blue-700 text-[10px] font-black uppercase tracking-widest rounded-full">${article.category}</span>
                        <span class="text-slate-400 text-xs font-bold uppercase tracking-widest">${article.date}</span>
                    </div>
                    <h1 class="text-4xl md:text-5xl font-black text-slate-900 tracking-tight leading-tight mb-8">${article.title}</h1>
                    <p class="font-medium text-slate-600 text-xl leading-relaxed mb-10">${article.summary}</p>
                    <div class="rounded-[3rem] overflow-hidden flex justify-center">
                      <img src="${article.img}" class="block">
                  </div>
                </header>
            `;
            document.title = `${article.title} | Enrique Coronado`;

        } catch (error) {
            console.error(error);
            container.innerHTML = `<div class="text-center py-20 text-slate-400">Error loading article data. Please check if the JSON file exists.</div>`;
        }
    }

    loadArticle();
</script>
</body>

</html>
