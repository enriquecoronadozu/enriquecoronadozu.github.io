<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News — Enrique Coronado</title>

  <!-- ============================================================
       NEWS ARTICLE TEMPLATE
       Do NOT edit copies of this file. Content lives in the JSON
       file with the SAME NAME as this HTML file:

         news/my-article.html  ->  loads  news/my-article.json

       New article = new JSON + run `python3 generate.py`
       (or just copy this file with the same name as the JSON).

       Preview needs a local server (fetch fails on file://):
         python3 -m http.server     -> http://localhost:8000

       JSON FIELDS (only the first six are required):
         id, date, category ("Paper"|"Award"|"News"), title,
         summary, img,
         byline   – journal / organization line (optional)
         body     – array of paragraphs, blog-style (optional)
         links    – array of { label, href } buttons (optional)
       ============================================================ -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap"
    rel="stylesheet">

  <!-- DESIGN TOKENS — identical to index.html; keep in sync -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink: '#16233F', body: '#4B5568', faint: '#8B93A3', line: '#DDE2EC',
            sky: '#4E9FD9', lime: '#DCF34B',
            blue: { DEFAULT: '#1173BC', deep: '#0A5697', text: '#1B6FB5' },
            cyan: '#A9EAFB', cyanfill: '#BFF0FC',
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['"IBM Plex Mono"', 'ui-monospace', 'monospace'],
          },
          maxWidth: { site: '80rem' },
        }
      }
    }
  </script>

  <style>
    body {
      font-family: 'Inter', system-ui, sans-serif;
      font-feature-settings: 'cv11', 'ss01';
      background: linear-gradient(180deg, #F4F6FB 0%, #EAEFF8 55%, #F1F4FA 100%);
    }
    .display { letter-spacing: -0.025em; }
    .meta {
      font-family: 'IBM Plex Mono', ui-monospace, monospace;
      font-size: 0.75rem; font-weight: 500;
      letter-spacing: 0.08em; text-transform: uppercase;
    }
    a:focus-visible, button:focus-visible {
      outline: 2px solid #1173BC; outline-offset: 3px; border-radius: 4px;
    }
    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      *, *::before, *::after { transition-duration: 0.01ms !important; }
    }
  </style>
</head>

<body class="text-ink antialiased">

  <!-- NAVIGATION — back pill + identity -->
  <nav aria-label="Main">
    <div class="max-w-site mx-auto px-5 h-16 flex items-center justify-between gap-6">
      <a href="../index.html#news"
        class="group inline-flex items-center gap-2.5 bg-white rounded-full pl-3 pr-5 py-2 text-sm font-medium text-body hover:text-ink shadow-sm transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"
          aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        Back to News
      </a>
      <a href="../index.html" class="leading-tight text-right">
        <span class="block font-bold text-[15px] display">Enrique Coronado</span>
        <span class="block text-[10px] text-faint font-medium tracking-wide">AIST · HEART</span>
      </a>
    </div>
  </nav>

  <main id="article-content" class="max-w-4xl mx-auto px-5 py-14">
    <div class="flex justify-center py-24" aria-label="Loading">
      <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue"></div>
    </div>
  </main>

  <footer>
    <div class="max-w-site mx-auto px-5 py-10 flex flex-col md:flex-row items-center justify-between gap-3 text-sm">
      <p class="font-semibold display">Enrique Coronado</p>
      <p class="meta text-faint">&copy; 2026 · AIST — HEART</p>
    </div>
  </footer>

  <script>
    async function loadArticle() {
      const container = document.getElementById('article-content');

      // The JSON filename is derived from THIS file's name:
      // some-article.html -> some-article.json (no editing needed per copy)
      const slug = decodeURIComponent(location.pathname.split('/').pop() || '')
        .replace(/\.html?$/i, '');

      try {
        const response = await fetch(`${slug}.json`);
        if (!response.ok) throw new Error(`Could not load ${slug}.json`);
        const a = await response.json();

        const chip = (a.category || 'News').toUpperCase();
        const byline = a.byline
          ? `<p class="text-body text-base mb-8">${a.byline}</p>` : '';
        const bodyHtml = Array.isArray(a.body) && a.body.length
          ? `<div class="mt-12 space-y-6">${a.body.map(p =>
              `<p class="text-body text-lg leading-[1.8]">${p}</p>`).join('')}</div>`
          : '';
        const linksHtml = Array.isArray(a.links) && a.links.length
          ? `<div class="mt-10 flex flex-wrap gap-4">${a.links.map(l => `
              <a href="${l.href}" target="_blank" rel="noopener"
                class="inline-flex items-center gap-2.5 bg-blue hover:bg-blue-deep text-white px-6 py-3.5 rounded-full font-medium text-[15px] transition-colors">
                ${l.label}
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M13.5 6H5.25A2.25 2.25 0 003 8.25v10.5A2.25 2.25 0 005.25 21h10.5A2.25 2.25 0 0018 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25"/>
                </svg>
              </a>`).join('')}</div>`
          : '';

        container.innerHTML = `
          <article>
            <header>
              <div class="flex items-center gap-4 mb-7">
                <span class="bg-lime text-ink text-[10px] font-bold tracking-wider rounded-full px-3 py-1">${chip}</span>
                <span class="meta text-faint">${a.date}</span>
              </div>
              <h1 class="display font-semibold text-4xl md:text-5xl leading-[1.12] mb-6">${a.title}</h1>
              ${byline}
              <p class="text-blue-text text-xl md:text-2xl leading-relaxed display font-medium mb-10">
                ${a.summary}
              </p>
              <div class="rounded-3xl overflow-hidden">
                <img src="${a.img}" alt="${a.title}" class="w-full object-cover">
              </div>
            </header>
            ${bodyHtml}
            ${linksHtml}
          </article>`;
        document.title = `${a.title} — Enrique Coronado`;

      } catch (error) {
        console.error(error);
        container.innerHTML = `
          <div class="text-center py-24">
            <p class="text-body mb-2">Could not load the article data.</p>
            <p class="meta text-faint">Expected file: ${slug}.json (and a local server — fetch does not work from file://)</p>
          </div>`;
      }
    }
    loadArticle();
  </script>
</body>

</html>
