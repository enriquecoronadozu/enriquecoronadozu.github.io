<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Display</title>
  <!-- Tailwind CSS CDN (Required for your class names to work) -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 flex justify-center items-center min-h-screen m-0">

  <!-- Video Container (Controls the size of the video on the screen) -->
  <div class="w-full max-w-2xl aspect-video rounded-lg overflow-hidden shadow-2xl">
    
    <video
      class="w-full h-full object-cover filter grayscale hover:grayscale-0 transition-all duration-1000 ease-in-out"
      autoplay 
      muted 
      loop 
      playsinline 
      <source src="test.mp4" type="video/mp4">
      <!-- Fallback text for older browsers -->
      Your browser does not support the video tag.
    </video>

  </div>

</body>
</html>
